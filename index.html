<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Store Showcase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        header {
            background: white;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #667eea;
        }

        .toolbar {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            padding: 15px;
            background: #fafafa;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar-group label {
            font-weight: 600;
            font-size: 0.95em;
        }

        select, input[type="text"], input[type="range"] {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
        }

        select {
            cursor: pointer;
        }

        input[type="range"] {
            width: 150px;
            padding: 0;
            border: none;
        }

        .view-toggle {
            display: flex;
            gap: 5px;
            margin-left: auto;
        }

        .view-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .table-view {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #667eea;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .seq-num {
            font-weight: 600;
            color: #999;
            width: 60px;
        }

        .expand-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            padding: 5px;
        }

        .song-detail {
            display: none;
        }

        .song-detail.expanded {
            display: table-row;
        }

        .detail-content {
            padding: 30px;
            background: #f9f9f9;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        .cover-art {
            width: 300px;
            height: 300px;
            border-radius: 8px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 20px;
            color: white;
            font-size: 1.2em;
            font-weight: 600;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }

        .cover-text {
            position: relative;
            z-index: 2;
            max-width: 100%;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .cover-artist {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 8px;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-section {
            padding: 15px;
            background: white;
            border-radius: 6px;
        }

        .info-label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 0.95em;
            text-transform: uppercase;
        }

        .info-value {
            margin-bottom: 10px;
        }

        .play-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        .gallery-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }

        .gallery-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .card-cover {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 15px;
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            overflow: hidden;
            position: relative;
        }

        .card-info {
            padding: 15px;
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        .card-artist {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85em;
        }

        .card-genre {
            background: #667eea;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .card-likes {
            color: #f44;
        }

        .pagination {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        .pagination button {
            padding: 10px 15px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .gallery-scroller {
            height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .value-display {
            font-weight: 600;
            color: #667eea;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🎵 Music Store Showcase</h1>
            
            <div class="toolbar">
                <div class="toolbar-group">
                    <label>Language:</label>
                    <select id="languageSelect" onchange="handleParameterChange()">
                        <option value="en">English (USA)</option>
                        <option value="de">German (Germany)</option>
                        <option value="uk">Ukrainian (Ukraine)</option>
                    </select>
                </div>

                <div class="toolbar-group">
                    <label>Seed:</label>
                    <input type="text" id="seedInput" value="12345" placeholder="Enter seed (1-64 bit)" onchange="handleParameterChange()">
                    <button class="view-btn" onclick="randomSeed()">Random</button>
                </div>

                <div class="toolbar-group">
                    <label>Likes per Song:</label>
                    <input type="range" id="likesSlider" min="0" max="10" step="0.1" value="5" onchange="handleParameterChange()">
                    <span class="value-display" id="likesValue">5.0</span>
                </div>

                <div class="view-toggle">
                    <button class="view-btn active" id="tableViewBtn" onclick="switchView('table')">Table</button>
                    <button class="view-btn" id="galleryViewBtn" onclick="switchView('gallery')">Gallery</button>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="tableViewContainer" style="display: block;">
            <div class="table-view">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th></th>
                            <th>Title</th>
                            <th>Artist</th>
                            <th>Album</th>
                            <th>Genre</th>
                            <th>Likes</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <button onclick="previousPage()" id="prevBtn">← Previous</button>
                <span id="pageInfo" style="align-self: center; font-weight: 600;">Page 1</span>
                <button onclick="nextPage()" id="nextBtn">Next →</button>
            </div>
        </div>

        <div id="galleryViewContainer" style="display: none;">
            <div id="galleryContent" class="gallery-view"></div>
            <div id="galleryLoading" class="loading" style="display: none;">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let currentView = 'table';
        let allSongs = [];
        let galleryPage = 1;
        let galleryLoading = false;

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadSongs();
            updateLikesDisplay();
        });

        function updateLikesDisplay() {
            document.getElementById('likesValue').textContent = 
                parseFloat(document.getElementById('likesSlider').value).toFixed(1);
        }

        function randomSeed() {
            document.getElementById('seedInput').value = Math.floor(Math.random() * 9007199254740991);
            handleParameterChange();
        }

        async function loadSongs() {
            const locale = document.getElementById('languageSelect').value;
            const seed = document.getElementById('seedInput').value;
            const likes = document.getElementById('likesSlider').value;

            try {
                const response = await fetch(
                    `http://localhost:5005/api/songs?page=${currentPage}&locale=${locale}&seed=${seed}&likes=${likes}`
                );
                if (!response.ok) throw new Error('Failed to load songs');
                
                const data = await response.json();
                allSongs = data.data || [];

                if (currentView === 'table') {
                    renderTableView();
                } else {
                    renderGalleryView();
                }
            } catch (err) {
                console.error('Error loading songs:', err);
                if (currentView === 'table') {
                    document.getElementById('tableBody').innerHTML = 
                        `<tr><td colspan="7" style="text-align: center; padding: 40px;">Error loading songs: ${err.message}</td></tr>`;
                }
            }
        }

        function renderTableView() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            allSongs.forEach((song, index) => {
                const rowId = `row-${song.id}`;
                
                const mainRow = document.createElement('tr');
                mainRow.className = 'main-row';
                mainRow.innerHTML = `
                    <td class="seq-num">${song.sequenceIndex}</td>
                    <td><button class="expand-btn" onclick="toggleDetail('${rowId}')">▶</button></td>
                    <td>${escapeHtml(song.title)}</td>
                    <td>${escapeHtml(song.artist)}</td>
                    <td>${escapeHtml(song.albumTitle)}</td>
                    <td>${escapeHtml(song.genre)}</td>
                    <td>❤️ ${song.likes}</td>
                `;
                tbody.appendChild(mainRow);

                const detailRow = document.createElement('tr');
                detailRow.id = rowId;
                detailRow.className = 'song-detail';
                detailRow.innerHTML = `
                    <td colspan="7">
                        <div class="detail-content">
                            <div class="cover-art" style="${generateCoverStyle(song.coverProps)}">
                                <div class="cover-text">
                                    <div>${escapeHtml(song.title)}</div>
                                    <div class="cover-artist">${escapeHtml(song.artist)}</div>
                                </div>
                            </div>
                            <div class="song-info">
                                <div class="info-section">
                                    <div class="info-label">Review</div>
                                    <div class="info-value">${escapeHtml(song.reviewText)}</div>
                                </div>
                                <div class="info-section">
                                    <div class="info-label">Play Preview</div>
                                    <button class="play-btn" onclick="playSong('${song.id}', '${song.audioProps.selectedTrack}', '${escapeHtml(song.title)}')">▶ Play</button>
                                    <audio id="audio-${song.id}" controls></audio>
                                </div>
                            </div>
                        </div>
                    </td>
                `;
                tbody.appendChild(detailRow);
            });

            document.getElementById('pageInfo').textContent = `Page ${currentPage}`;
        }

        function renderGalleryView() {
            const container = document.getElementById('galleryContent');
            container.innerHTML = '';

            allSongs.forEach(song => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.innerHTML = `
                    <div class="card-cover" style="${generateCoverStyle(song.coverProps)}">
                        <div class="cover-text">
                            <div>${escapeHtml(song.title)}</div>
                            <div class="cover-artist">${escapeHtml(song.artist)}</div>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="card-title">${escapeHtml(song.title)}</div>
                        <div class="card-artist">${escapeHtml(song.artist)}</div>
                        <div class="card-meta">
                            <span class="card-genre">${escapeHtml(song.genre)}</span>
                            <span class="card-likes">❤️ ${song.likes}</span>
                        </div>
                    </div>
                `;
                card.onclick = () => showCardDetail(song);
                container.appendChild(card);
            });
        }

        function generateCoverStyle(coverProps) {
            return `background: ${coverProps.bgGradient}; filter: blur(${coverProps.blurAmount}px);`;
        }

        function toggleDetail(rowId) {
            const element = document.getElementById(rowId);
            const btn = event.target;
            element.classList.toggle('expanded');
            btn.textContent = element.classList.contains('expanded') ? '▼' : '▶';
        }

        function switchView(view) {
            currentView = view;
            currentPage = 1;
            galleryPage = 1;

            document.getElementById('tableViewContainer').style.display = view === 'table' ? 'block' : 'none';
            document.getElementById('galleryViewContainer').style.display = view === 'gallery' ? 'block' : 'none';

            document.getElementById('tableViewBtn').classList.toggle('active', view === 'table');
            document.getElementById('galleryViewBtn').classList.toggle('active', view === 'gallery');

            loadSongs();
        }

        function handleParameterChange() {
            currentPage = 1;
            galleryPage = 1;
            updateLikesDisplay();
            loadSongs();
        }

        function nextPage() {
            currentPage++;
            loadSongs();
            window.scrollTo(0, 0);
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                loadSongs();
                window.scrollTo(0, 0);
            }
        }

        function playSong(songId, trackUrl, title) {
            const audio = document.getElementById(`audio-${songId}`);
            audio.src = trackUrl;
            audio.play();
        }

        function showCardDetail(song) {
            alert(`${song.title}\n${song.artist}\n${song.genre}\n❤️ ${song.likes} likes\n\n${song.reviewText}`);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
